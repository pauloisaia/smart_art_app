<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Art Studio - Painel BLE</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #1a1a1a;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .status-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .status-row:last-child {
            margin-bottom: 0;
        }
        .status-label { color: #64748b; font-weight: 500; }
        .status-value { font-weight: 600; color: #334155; }
        .status-value.connected { color: #10b981; }
        .status-value.disconnected { color: #ef4444; }
        
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }
        select, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        button:hover { background: #1d4ed8; }
        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            color: #94a3b8;
        }
        button.btn-disconnect {
            background: #ef4444;
        }
        button.btn-disconnect:hover { background: #dc2626; }
        
        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 100px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }
        .progress-bar {
            background: #3b82f6;
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }
        .log-box {
            background: #0f172a;
            color: #38bdf8;
            font-family: monospace;
            font-size: 12px;
            padding: 12px;
            border-radius: 6px;
            height: 120px;
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #1e293b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart-Art Studio</h1>
    <p class="subtitle">Atualizador de Coreografias via Web Bluetooth</p>

    <div class="status-card">
        <div class="status-row">
            <span class="status-label">Dispositivo:</span>
            <span id="device-name" class="status-value disconnected">Desconectado</span>
        </div>
        <div class="status-row">
            <span class="status-label">Status BLE:</span>
            <span id="ble-status" class="status-value">Aguardando ação...</span>
        </div>
    </div>

    <button id="btn-connect" onclick="connectBLE()">Conectar ao Quadro</button>
    <button id="btn-disconnect" class="btn-disconnect" onclick="disconnectBLE()" style="display:none;">Desconectar</button>

    <div id="transfer-controls" style="opacity: 0.5; pointer-events: none; transition: opacity 0.3s;">
        <div class="control-group">
            <label for="file-target">Destino no Cartão SD:</label>
            <select id="file-target">
                <option value="config.txt">config.txt (Configurações Globais)</option>
                <option value="led_1.txt">led_1.txt (Música/Modo 1)</option>
                <option value="led_2.txt">led_2.txt (Música/Modo 2)</option>
                <option value="led_3.txt">led_3.txt (Música/Modo 3)</option>
                <option value="led_4.txt">led_4.txt (Música/Modo 4)</option>
                <option value="led_5.txt">led_5.txt (Música/Modo 5)</option>
                <option value="led_6.txt">led_6.txt (Música/Modo 6)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="file-input">Selecione o arquivo modificado do PC:</label>
            <input type="file" id="file-input" accept=".txt,.TXT">
        </div>

        <button id="btn-send" onclick="sendFile()">Enviar Arquivo para o Quadro</button>
        
        <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div class="log-box" id="log-box">Console inicializado. Pronto para pareamento...</div>
</div>

<script>
    // UUIDs Oficiais do Perfil NUS (Nordic UART Service) - Padrão do mercado para simular Serial via BLE
    const NUS_SERVICE_UUID   = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const NUS_RX_CHAR_UUID   = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // O PC grava dados aqui (Entrada no ESP32)

    let bleDevice = null;
    let rxCharacteristic = null;

    function log(msg) {
        const box = document.getElementById('log-box');
        box.innerHTML += `<br>> ${msg}`;
        box.scrollTop = box.scrollHeight;
    }

    async function connectBLE() {
        try {
            log("Solicitando permissão Bluetooth ao navegador...");
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'SmartArt' }, { namePrefix: 'ESP32' }],
                optionalServices: [NUS_SERVICE_UUID]
            });

            log(`Conectando ao dispositivo: ${bleDevice.name}...`);
            document.getElementById('ble-status').innerText = "Conectando gatt...";
            const server = await bleDevice.gatt.connect();

            log("Buscando Serviço de Transmissão UART...");
            const service = await server.getPrimaryService(NUS_SERVICE_UUID);

            log("Vinculando Canal de Escrita (RX)...");
            rxCharacteristic = await service.getCharacteristic(NUS_RX_CHAR_UUID);

            // Interface em caso de sucesso
            document.getElementById('device-name').innerText = bleDevice.name;
            document.getElementById('device-name').className = "status-value connected";
            document.getElementById('ble-status').innerText = "Pronto para transferência";
            document.getElementById('btn-connect').style.display = 'none';
            document.getElementById('btn-disconnect').style.display = 'block';
            document.getElementById('transfer-controls').style.opacity = '1';
            document.getElementById('transfer-controls').style.pointerEvents = 'auto';
            
            log("Conexão estabelecida com sucesso!");

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        } catch (error) {
            log(`Erro ou Cancelado: ${error}`);
            document.getElementById('ble-status').innerText = "Falha na conexão";
        }
    }

    function onDisconnected() {
        log("O Quadro foi desconectado.");
        document.getElementById('device-name').innerText = "Desconectado";
        document.getElementById('device-name').className = "status-value disconnected";
        document.getElementById('ble-status').innerText = "Aguardando ação...";
        document.getElementById('btn-connect').style.display = 'block';
        document.getElementById('btn-disconnect').style.display = 'none';
        document.getElementById('transfer-controls').style.opacity = '0.5';
        document.getElementById('transfer-controls').style.pointerEvents = 'none';
        rxCharacteristic = null;
        bleDevice = null;
    }

    function disconnectBLE() {
        if (bleDevice && bleDevice.gatt.connected) {
            bleDevice.gatt.disconnect();
        }
    }

    async function sendFile() {
        const fileInput = document.getElementById('file-input');
        const targetSelect = document.getElementById('file-target');
        
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("Por favor, selecione um arquivo de texto (.txt) primeiro!");
            return;
        }

        if (!rxCharacteristic) {
            alert("O dispositivo Bluetooth não está pronto!");
            return;
        }

        const file = fileInput.files[0];
        const targetFilename = targetSelect.value;
        log(`Lendo arquivo local: ${file.name} (${file.size} bytes)...`);

        const reader = new FileReader();
        reader.onload = async function(e) {
            const textContent = e.target.result;
            
            // Trava os botões durante a transferência
            document.getElementById('btn-send').disabled = true;
            document.getElementById('progress-container').style.display = 'block';
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = '0%';

            try {
                // 1. Comando de Abertura de Protocolo: Avisa qual arquivo vai ser reescrito no SD Card
                log(`Enviando cabeçalho de inicialização para: ${targetFilename}`);
                const header = `START_TXT:${targetFilename}
`;
                await rxCharacteristic.writeValueWithResponse(new TextEncoder().encode(header));
                
                // Pequeno delay para o ESP32 abrir o arquivo no SD Card com segurança
                await new Promise(r => setTimeout(r, 300));

                // 2. Fragmentação do arquivo em pacotes MTU seguros (Ex: 200 bytes por vez)
                const chunkSize = 200;
                const encoder = new TextEncoder();
                let bytesSent = 0;
                const totalBytes = textContent.length;

                log("Iniciando streaming de dados via BLE...");
                
                for (let i = 0; i < totalBytes; i += chunkSize) {
                    const chunkStr = textContent.substring(i, i + chunkSize);
                    const chunkBuffer = encoder.encode(chunkStr);
                    
                    // Escreve o bloco na memória do ESP32 e aguarda a confirmação de recebimento
                    await rxCharacteristic.writeValueWithResponse(chunkBuffer);
                    
                    bytesSent += chunkStr.length;
                    const percent = Math.round((bytesSent / totalBytes) * 100);
                    progressBar.style.width = `${percent}%`;
                    document.getElementById('ble-status').innerText = `Enviando... ${percent}%`;
                }

                // 3. Comando de Fechamento de Protocolo: Avisa que o arquivo terminou
                await new Promise(r => setTimeout(r, 200));
                log("Enviando comando de encerramento...");
                const footer = `END_TXT:${targetFilename}
`;
                await rxCharacteristic.writeValueWithResponse(encoder.encode(footer));

                log(`Sucesso absoluto! ${targetFilename} atualizado sem cabos.`);
                document.getElementById('ble-status').innerText = "Transferência Concluída!";
                alert(`Arquivo ${targetFilename} gravado com sucesso no quadro!`);

            } catch (err) {
                log(`Falha crítica no meio do envio: ${err}`);
                document.getElementById('ble-status').innerText = "Erro no envio";
            } finally {
                document.getElementById('btn-send').disabled = false;
                setTimeout(() => {
                    document.getElementById('progress-container').style.display = 'none';
                    if(bleDevice) document.getElementById('ble-status').innerText = "Pronto para transferência";
                }, 3000);
            }
        };

        reader.readAsText(file);
    }
</script>

</body>
</html>
